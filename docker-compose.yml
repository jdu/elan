services:

  # ── Object storage ──────────────────────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: elan-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - elan
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # One-shot container: creates the elan-data bucket.
  # The coordinator uploads the actual data files once it starts.
  minio-init:
    image: minio/mc:latest
    container_name: elan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/elan-data --ignore-existing &&
        echo 'bucket ready'
      "
    networks:
      - elan

  # ── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: elan-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - elan

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: elan-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - elan

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: elan-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: elan
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - elan

  # ── Elan services ───────────────────────────────────────────────────────────

  elan-central:
    build:
      context: .
      dockerfile: Dockerfile
    image: elan:latest
    container_name: elan-central
    command: ["/usr/local/bin/elan-central", "--config", "/app/config/central.docker.toml"]
    ports:
      - "50051:50051"   # gRPC
      - "8080:8080"     # HTTP health
    volumes:
      - ./config:/app/config:ro
    networks:
      - elan
    environment:
      RUST_LOG: "info,elan_central=debug"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  elan-coordinator:
    image: elan:latest
    container_name: elan-coordinator
    command: ["/usr/local/bin/elan-coordinator", "--config", "/app/config/coordinator.docker.toml"]
    ports:
      - "8081:8081"
    depends_on:
      elan-central:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:ro   # local files — coordinator reads and uploads to MinIO
    networks:
      - elan
    environment:
      RUST_LOG: "info,elan_coordinator=debug"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Executor workers — no local data volume needed; they read from MinIO.
  # Scale with: docker compose up --scale elan-executor=3
  elan-executor:
    image: elan:latest
    command: ["/usr/local/bin/elan-executor", "--config", "/app/config/executor.docker.toml"]
    depends_on:
      elan-coordinator:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
    networks:
      - elan
    environment:
      RUST_LOG: "info,elan_executor=debug"
    restart: unless-stopped

  # nginx load balancer — sits in front of the executor worker pool.
  # elan-query sends HTTP SQL requests to elan-executor-lb:50056; nginx
  # round-robins them across all elan-executor replicas.
  # The coordinator registers executor endpoint as elan-executor-lb:50055 so
  # that elan-query derives port 50056 (+1) for the HTTP SQL service.
  elan-executor-lb:
    image: nginx:alpine
    container_name: elan-executor-lb
    depends_on:
      - elan-executor
    ports:
      - "50056:50056"
    volumes:
      - ./nginx/executor.conf:/etc/nginx/nginx.conf:ro
    networks:
      - elan
    restart: unless-stopped

  elan-query:
    image: elan:latest
    container_name: elan-query
    command: ["/usr/local/bin/elan-query", "--config", "/app/config/query.docker.toml"]
    ports:
      - "3001:3000"
    depends_on:
      elan-central:
        condition: service_healthy
      elan-executor-lb:
        condition: service_started
      kafka:
        condition: service_started
    volumes:
      - ./config:/app/config:ro
    networks:
      - elan
    environment:
      RUST_LOG: "info,elan_query=debug"
    restart: unless-stopped

networks:
  elan:
    driver: bridge

volumes:
  minio-data:
