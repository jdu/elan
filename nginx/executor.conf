# nginx load balancer for elan-executor worker pool.
#
# Listens on :50056 (the HTTP SQL service port) and round-robins requests
# across all elan-executor replicas.
#
# Docker's embedded DNS server (127.0.0.11) is used as the resolver so that
# nginx re-queries for executor IPs on every request.  This ensures newly
# started replicas (`docker compose up --scale elan-executor=N`) are picked
# up without restarting nginx.

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=5s ipv6=off;

    upstream executor_pool {
        server elan-executor:50056;
    }

    server {
        listen 50056;

        location / {
            # Re-resolve DNS dynamically so replicas are discovered without
            # restarting nginx.  The variable trick forces per-request lookups.
            set $backend http://elan-executor:50056;
            proxy_pass $backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Arrow IPC result streams can be large; give them time.
            proxy_read_timeout    300s;
            proxy_connect_timeout  10s;
            proxy_send_timeout    300s;
        }
    }
}
